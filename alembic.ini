# alembic.ini — Sabueso de Licitaciones

[alembic]
# Carpeta donde viven los ficheros de migración
script_location = alembic

# Plantilla de nombres: 2026_04_23_0930-a1b2c3d4_baseline_initial_schema.py
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Placeholder. env.py lo sobreescribe con config.DATABASE_URL
sqlalchemy.url = sqlite:///_placeholder_.db


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S